<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Wellsty</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="js/products.js"></script>
    <script src="js/common.js"></script>
</head>
<body>
    <div class="hero-gradient-overlay"></div>

    <header id="mainHeader" class="scrolled">
        <div class="logo-container">
            <div class="brand-name">Wellsty</div>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="fashion.html">Fashion</a>
            <a href="accessories.html">Accessories</a>
            <a href="index.html#features">About</a>
        </nav>
        <div class="header-icons">
            <div class="search-wrapper" id="searchWrapper">
                <i class="fas fa-search search-trigger" id="searchTrigger"></i>
                <div class="search-expand glass" id="searchExpand">
                    <input type="text" id="searchInput" placeholder="Search Wellsty..." autocomplete="off">
                    <i class="fas fa-times search-close" id="searchClose"></i>
                </div>
            </div>
            <a href="#" class="icon-btn" id="userBtn"><i class="far fa-user"></i></a>
            <a href="#" class="icon-btn" id="cartBtn">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count" id="cartCount">0</span>
            </a>
        </div>
    </header>

    <div id="modalsContainer"></div>

    <section class="container product-container" id="productDetailsContainer">
        <!-- Content will be loaded dynamically -->
        <div style="padding: 10rem; text-align: center; width: 100%;">Loading product...</div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col" style="padding-right: 2rem;">
                    <div class="brand-name" style="margin-bottom: 2rem; display: block;">Wellsty</div>
                    <p>Elevating Indian Streetwear through premium quality and modern aesthetics.</p>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-facebook-f"></i></a>
                    </div>
                </div>
                <div class="footer-col">
                    <h4>Shop</h4>
                    <ul>
                        <li><a href="fashion.html">Fashion</a></li>
                        <li><a href="accessories.html">Accessories</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h4>Support</h4>
                    <ul>
                        <li><a href="#">Help Center</a></li>
                        <li><a href="#">Returns</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h4>Updates</h4>
                    <button class="btn-premium" style="width: 100%; border-radius: 8px; padding: 0.8rem;">Subscribe</button>
                </div>
            </div>
            <div class="copyright">
                &copy; 2026 Wellsty Group. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id') || 3; // Default to 3 for demo
            const product = getProductById(productId);

            if (product) {
                const container = document.getElementById('productDetailsContainer');
                container.innerHTML = `
                    <div class="image-gallery">
                        <div class="img-grid-item glass"><img src="${product.image}" alt="Detail"></div>
                        <div class="img-grid-item glass"><img src="${product.image}" alt="Detail"></div>
                        <div class="img-grid-item glass"><img src="${product.image}" alt="Detail"></div>
                        <div class="img-grid-item glass"><img src="${product.image}" alt="Detail"></div>
                    </div>

                    <div class="product-details-content">
                        <div class="brand-title">${BRAND_NAME} Luxe</div>
                        <h1 class="p-name">${product.title}</h1>
                        
                        <div class="p-price-row">
                            <span class="p-current-price">$${parseFloat(product.price).toFixed(2)}</span>
                            <span class="p-mrp">$${(parseFloat(product.price) * 1.3).toFixed(2)}</span>
                            <span class="p-discount">30% OFF</span>
                        </div>

                        <p style="color: var(--text-muted); margin-bottom: 3rem;">${product.description}</p>

                        <div class="action-buttons" style="display: flex; gap: 1rem;">
                            <button class="btn-premium" style="flex: 1; padding: 1.2rem; justify-content: center;" onclick="handleAddToCart(event, ${JSON.stringify(product).replace(/"/g, '&quot;')})">
                                <i class="fas fa-shopping-bag"></i> Add to Bag
                            </button>
                            <button class="glass" style="padding: 0 1.5rem; border-radius: 100px; color: var(--text-main);" onclick="toggleWishlist(event, ${product.id})">
                                <i class="${isProductInWishlist(product.id) ? 'fas' : 'far'} fa-heart"></i>
                            </button>
                        </div>

                        <div class="p-meta">
                            <h4>Specification</h4>
                            <ul>
                                <li>Materials: Premium Grade</li>
                                <li>Warranty: 2 Year Wellsty Protection</li>
                                <li>Category: ${product.category}</li>
                            </ul>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
